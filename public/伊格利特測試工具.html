<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>懂妳測試工具</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
      padding: 24px;
    }
    main {
      width: min(760px, 100%);
      margin: 0 auto;
    }
    h1 {
      color: #79c0ff;
      font-size: 22px;
      margin: 0 0 12px;
    }
    p {
      color: #c9d1d9;
      line-height: 1.7;
    }
    .panel {
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #161b22;
      padding: 16px;
      margin-top: 18px;
    }
    label {
      display: block;
      color: #8b949e;
      font-size: 13px;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #0d1117;
      color: #e6edf3;
      font: inherit;
      line-height: 1.6;
      padding: 12px;
    }
    button {
      border: 0;
      border-radius: 6px;
      background: #238636;
      color: #fff;
      cursor: pointer;
      font: inherit;
      margin-top: 12px;
      padding: 10px 16px;
    }
    .result {
      white-space: pre-wrap;
      border-radius: 6px;
      background: #0d1117;
      color: #e6edf3;
      min-height: 80px;
      padding: 12px;
    }
  </style>
</head>
<body>
  <main>
    <h1>懂妳測試工具</h1>
    <p>這個頁面只做內部文字整理，不連接 OpenRouter，也不包含任何 API key。正式對話請從懂妳主頁登入後測試。</p>

    <section class="panel">
      <label for="sentences">測試語句（一行一句）</label>
      <textarea id="sentences" placeholder="在這裡貼上要人工檢查的測試語句"></textarea>
      <button type="button" id="summarizeBtn">整理測試摘要</button>
    </section>

    <section class="panel">
      <label>摘要</label>
      <div class="result" id="result">尚未產生摘要。</div>
    </section>
  </main>

  <script>
    document.getElementById('summarizeBtn').addEventListener('click', () => {
      const sentences = document.getElementById('sentences').value
        .split('\n')
        .map((line) => line.trim())
        .filter(Boolean);

      document.getElementById('result').textContent = sentences.length
        ? `共 ${sentences.length} 句待測。\n\n${sentences.map((line, index) => `${index + 1}. ${line}`).join('\n')}`
        : '請先輸入測試語句。';
    });
  </script>
</body>
</html>
